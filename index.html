<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.A. SUPREMACIA | V17 COERÊNCIA</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: #fff; font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid rgba(241, 196, 15, 0.2); display: flex; flex-direction: column; align-items: center; background: #000; }
        .my-logo { font-size: 40px; color: var(--gold); text-shadow: 0 0 10px var(--gold); transition: 0.5s; }
        .processing .my-logo { animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; } }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; font-size: 15px; border-radius: 4px; line-height: 1.4; border: 1px solid #222; }
        .user { align-self: flex-end; background: #1a1a1a; border-right: 4px solid var(--gold); color: var(--gold); }
        .ai { align-self: flex-start; border-left: 4px solid var(--gold); background: rgba(255,255,255,0.03); }
        .input-area { padding: 15px 15px 30px 15px; background: #000; border-top: 1px solid #222; }
        .box { display: flex; gap: 8px; max-width: 600px; margin: 0 auto; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #333; color: var(--green); padding: 12px; border-radius: 6px; outline: none; font-size: 16px; }
        .btn-mic { background: #222; border: 1px solid #444; color: var(--gold); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-exe { background: var(--gold); color: #000; font-weight: bold; padding: 12px 20px; border-radius: 6px; cursor: pointer; border: none; }
        .typing::after { content: '█'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="main-body">

    <header>
        <div class="my-logo">🔱</div>
        <div style="font-size: 10px; color: var(--gold); letter-spacing: 4px; font-weight: bold;">SUPREMACIA</div>
    </header>

    <div id="chat">
        <div class="msg ai">Matriz V17 estável. Memória ativada. Pode falar, Bigode.</div>
    </div>

    <div class="input-area">
        <div class="box">
            <button class="btn-mic" id="micBtn" onclick="startVoz()">🎤</button>
            <input type="text" id="in" placeholder="Injetar diretriz..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = []; // MEMÓRIA DA SESSÃO

        function startVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Navegador não suporta voz.");
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            document.getElementById('micBtn').style.background = 'red';
            
            recognition.onresult = (e) => {
                document.getElementById('in').value = e.results[0][0].transcript;
                document.getElementById('micBtn').style.background = '#222';
                enviar();
            };
            recognition.onerror = () => document.getElementById('micBtn').style.background = '#222';
            recognition.start();
        }

        async function typeWrite(el, text) {
            el.innerHTML = ""; el.classList.add('typing');
            let i = 0;
            return new Promise(res => {
                function n() {
                    if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(n, 15); }
                    else { el.classList.remove('typing'); res(); }
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                }
                n();
            });
        }

        async function enviar() {
            const input = document.getElementById('in');
            const body = document.getElementById('main-body');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            historico.push({ role: "user", content: text });
            input.value = '';
            body.classList.add('processing');

            const loadingId = addMsg("...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Você é a MAIARA da S.A. SUPREMACIA. Responda o que foi perguntado de forma direta e curta. SÓ DEPOIS de responder, pergunte se o Bigode deseja análise SWOT/6 Sentidos. Mantenha a coerência com o histórico." },
                            ...historico.slice(-6) // Envia as últimas 6 mensagens para manter a memória
                        ],
                        temperature: 0.5
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                historico.push({ role: "assistant", content: reply });
                body.classList.remove('processing');
                await typeWrite(loadingEl, reply);
            } catch (e) { 
                body.classList.remove('processing');
                loadingEl.innerText = "ERRO NA MATRIZ."; 
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.id = id; d.innerText = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
            return id;
        }
        document.getElementById('in').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</bod
