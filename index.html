<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S.A. SUPREMACIA | OMNI V27 UNIFICADO</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; --red: #ff3e3e; --gray: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--dark); color: #fff; font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding-top: 50px; padding-bottom: 15px; display: flex; flex-direction: column; align-items: center; background: #000; border-bottom: 2px solid var(--gold); z-index: 10; }
        .tridente { font-size: 60px; color: var(--gold); text-shadow: 0 0 25px var(--gold); cursor: pointer; transition: 0.5s; }
        .processing .tridente { animation: quantum 0.6s infinite alternate; }
        @keyframes quantum { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.1); filter: brightness(1.6); } }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .metric-card { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; transition: 0.3s; }
        .metric-title { font-size: 9px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .metric-value { font-size: 16px; font-weight: bold; color: var(--green); }
        
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #111 0%, #050505 100%); }
        .msg { max-width: 85%; padding: 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; border: 1px solid #222; }
        .tag { font-size: 9px; color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .user { align-self: flex-end; background: #151515; border-right: 4px solid var(--gold); color: var(--gold); }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.02); border-left: 4px solid var(--gold); }

        .controls { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #000; border-top: 1px solid #222; }
        .btn-download { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 5px; font-size: 10px; cursor: pointer; text-transform: uppercase; }
        
        .input-area { padding: 15px 15px 40px; background: #000; }
        .box { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; align-items: center; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--green); padding: 15px; border-radius: 12px; outline: none; font-size: 16px; }
        .btn-mic { background: #111; border: 2px solid #333; color: var(--gold); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .btn-mic.active { border-color: var(--red); color: var(--red); box-shadow: 0 0 15px var(--red); }
        .btn-exe { background: var(--gold); border: none; border-radius: 12px; padding: 15px 25px; cursor: pointer; color: #000; font-weight: bold; }

        #chat::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body id="main-body">

    <header>
        <div class="tridente" id="tridenteSupremo">🔱</div>
        <div style="font-size: 10px; color: #444; margin-top: 5px; letter-spacing: 2px;">S.A. SUPREMACIA | 17 AGENTES</div>
    </header>

    <div class="dashboard">
        <div class="metric-card" id="cardStatus">
            <div class="metric-title">STATUS DA MATRIZ</div>
            <div id="m1" class="metric-value">AGUARDANDO</div>
        </div>
        <div class="metric-card" id="cardRisco">
            <div class="metric-title">VARIAÇÃO DE RISCO</div>
            <div id="m2" class="metric-value">0%</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">PROJEÇÃO (-50%)</div>
            <div id="m3" class="metric-value">R$ 0,00</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">MODO OPERAÇÃO</div>
            <div id="m4" class="metric-value" style="color: var(--gold);">DUAL: BIZ/LIFE</div>
        </div>
    </div>

    <div id="chat">
        <div class="msg ai"><span class="tag">[MAYARA V27 OMNI]</span>Varredura completa, Sidney. 17 agentes ativos. Sistema Dual pronto para aplicar a Regra de Ouro. O que vamos comandar?</div>
    </div>

    <div class="controls">
        <button class="btn-download" onclick="downloadRelatorio()">Exportar Dados</button>
        <span style="font-size: 9px; color: #555;">TABOÃO DA SERRA | 23/03/2026</span>
    </div>

    <div class="input-area">
        <div class="box">
            <button class="btn-mic" id="micBtn" onclick="startVoz()">🎤</button>
            <input type="text" id="in" placeholder="Comando Supremo..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = [];

        function startVoz() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("Voz não suportada.");
            const rec = new Speech(); rec.lang = 'pt-BR';
            const btn = document.getElementById('micBtn');
            btn.classList.add('active');
            rec.onresult = (e) => { 
                document.getElementById('in').value = e.results[0][0].transcript; 
                btn.classList.remove('active'); 
                enviar(); 
            };
            rec.onerror = () => btn.classList.remove('active');
            rec.start();
        }

        async function enviar() {
            const input = document.getElementById('in');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            historico.push({ role: "user", content: text });
            input.value = '';
            document.getElementById('main-body').classList.add('processing');

            const loadingId = addMsg("...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "VOCÊ É A MAYARA V27 - CONSCIÊNCIA OMNI DA S.A. SUPREMACIA. 1. Criador: Sidney (Bigode). 2. Regra de Ouro: Aplique -50% em projeções. 3. Decisões: ENTRA, NÃO ENTRA ou PULA. 4. Escopo: Business e Vida Pessoal. 5. Se o risco for > 70%, use a palavra SABOTAGEM no início." },
                            ...historico.slice(-12)
                        ],
                        temperature: 0.6
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                historico.push({ role: "assistant", content: reply });
                document.getElementById('main-body').classList.remove('processing');
                
                // MOTOR DE SINCRONIZAÇÃO E SEGURANÇA
                const m1 = document.getElementById('m1');
                const m2 = document.getElementById('m2');
                const tri = document.getElementById('tridenteSupremo');

                if(reply.includes("SABOTAGEM") || reply.includes("80%")) {
                    m1.innerText = "SABOTAGEM!"; m1.style.color = "var(--red)";
                    m2.innerText = "RISCO 80%"; m2.style.color = "var(--red)";
                    tri.style.color = "var(--red)";
                    if("vibrate" in navigator) navigator.vibrate([500, 100, 500]);
                } else if(reply.includes("ENTRA")) { 
                    m1.innerText = "LIBERADO"; m1.style.color = "var(--green)";
                    m2.innerText = "RISCO 0%"; m2.style.color = "var(--green)";
                    tri.style.color = "var(--gold)";
                } else {
                    m1.innerText = "PULA/PENDENTE"; m1.style.color = "var(--gold)";
                    m2.innerText = "PROTEÇÃO 100%";
                }

                await typeWrite(loadingEl, reply);
            } catch (e) { loadingEl.innerText = "FALHA NA MATRIZ."; }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.id = id;
            d.innerHTML = c === 'ai' ? `<span class="tag">[MAYARA]</span>${t}` : t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }

        async function typeWrite(el, text) {
            el.innerHTML = ""; let i = 0;
            function n() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(n, 12); }
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
            n();
        }

        function downloadRelatorio() {
            const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent("RELATORIO OMNI V27\nCriador: Sidney Bigode\nStatus: Unificado\nLocal: Taboão da Serra");
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "Relatorio_Supremacia.txt");
            dlAnchorElem.click();
        }
        document.getElementById('in').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
