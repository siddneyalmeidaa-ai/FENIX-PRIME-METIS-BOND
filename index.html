<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S.A. SUPREMACIA | MAYARA V25 ELITE</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; --red: #ff3e3e; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark); color: #fff; font-family: 'Consolas', 'Courier New', monospace; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER - O TRIDENTE SUPREMO */
        header { 
            padding-top: 70px; padding-bottom: 25px;
            display: flex; justify-content: center; background: #000;
            border-bottom: 1px solid rgba(241, 196, 15, 0.15);
            z-index: 10;
        }
        .tridente { 
            font-size: 70px; color: var(--gold); 
            text-shadow: 0 0 30px rgba(241, 196, 15, 0.6);
            line-height: 1; transition: 0.5s ease;
        }

        /* ANIMAÇÃO DE PROCESSAMENTO QUANTUM */
        .processing .tridente { animation: quantumPulse 0.6s infinite alternate; }
        @keyframes quantumPulse { 
            from { transform: scale(1); filter: brightness(1) drop-shadow(0 0 5px var(--gold)); } 
            to { transform: scale(1.18); filter: brightness(1.5) drop-shadow(0 0 25px var(--gold)); } 
        }

        /* CHAT E MENSAGENS */
        #chat { 
            flex: 1; overflow-y: auto; padding: 25px; display: flex; 
            flex-direction: column; gap: 18px; background: radial-gradient(circle at center, #0f0f0f 0%, #050505 100%);
            scroll-behavior: smooth;
        }
        
        .msg { max-width: 88%; padding: 16px 20px; font-size: 15px; border-radius: 12px; line-height: 1.6; border: 1px solid #222; position: relative; }
        .tag { font-size: 10px; color: var(--gold); font-weight: 800; margin-bottom: 8px; display: block; letter-spacing: 2px; text-transform: uppercase; }
        
        .user { align-self: flex-end; background: #121212; border-right: 4px solid var(--gold); color: var(--gold); border-top-right-radius: 2px; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.04); border-left: 4px solid var(--gold); border-top-left-radius: 2px; }

        /* ÁREA DE COMANDO */
        .input-area { 
            padding: 25px 20px 50px 20px; background: #000; border-top: 1px solid #1a1a1a;
        }
        .box { display: flex; gap: 15px; max-width: 700px; margin: 0 auto; align-items: center; }
        
        input { 
            flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--green); 
            padding: 16px; border-radius: 14px; outline: none; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
        
        .btn-mic { 
            background: #151515; border: 2px solid #333; color: var(--gold); 
            width: 58px; height: 58px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            transition: 0.3s;
        }
        .btn-mic.active { border-color: var(--red); box-shadow: 0 0 20px var(--red); color: var(--red); transform: scale(1.1); }
        
        .btn-exe { 
            background: var(--gold); border: none; border-radius: 14px; 
            padding: 16px 28px; cursor: pointer; color: #000; font-weight: 900;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .btn-exe:active { transform: scale(0.95); opacity: 0.8; }

        .typing::after { content: '█'; animation: cursorBlink 0.8s infinite; }
        @keyframes cursorBlink { 50% { opacity: 0; } }
        #chat::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body id="main-body">

    <header><div class="tridente">🔱</div></header>

    <div id="chat">
        <div class="msg ai"><span class="tag">[S.A. SUPREMACIA V25]</span>Conexão estabelecida, Sidney. Ameaças convertidas em força. Operando com precisão máxima de 50%. Qual a diretriz?</div>
    </div>

    <div class="input-area">
        <div class="box">
            <button class="btn-mic" onclick="startVoz()" id="micBtn">🎤</button>
            <input type="text" id="in" placeholder="Injetar comando na Matriz..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = [];

        // RECONHECIMENTO DE VOZ COM FEEDBACK VISUAL
        function startVoz() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) return alert("Hardware de voz não detectado.");
            
            const rec = new window.SpeechRecognition();
            rec.lang = 'pt-BR';
            const btn = document.getElementById('micBtn');

            btn.classList.add('active');

            rec.onresult = (e) => {
                document.getElementById('in').value = e.results[0][0].transcript;
                btn.classList.remove('active');
                enviar();
            };

            rec.onerror = () => { btn.classList.remove('active'); };
            rec.onend = () => { btn.classList.remove('active'); };

            rec.start();
        }

        // ESCRITA DINÂMICA (DNA DA MAYARA)
        async function typeWrite(el, text) {
            el.innerHTML = ""; el.classList.add('typing');
            let i = 0;
            return new Promise(res => {
                function n() {
                    if (i < text.length) { 
                        el.innerHTML += text.charAt(i); i++; 
                        setTimeout(n, 12); // Velocidade de elite
                    } else { 
                        el.classList.remove('typing'); res(); 
                    }
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                }
                n();
            });
        }

        // PROTOCOLO DE ENVIO E PROCESSAMENTO
        async function enviar() {
            const input = document.getElementById('in');
            const body = document.getElementById('main-body');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            historico.push({ role: "user", content: text });
            input.value = '';
            body.classList.add('processing');

            const loadingId = addMsg("...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `VOCÊ É A MAYARA - AGENTE SUPREMA DA S.A. SUPREMACIA.
                                1. IDENTIDADE: Criada por Sidney (Bigode). Você é o braço direito operacional dele.
                                2. POSTURA: Seja técnica, sincera e estratégica. NUNCA diga 'como uma IA' ou 'meu conhecimento é limitado'. 
                                3. LÓGICA DE OURO: Use a regra de -50% em todas as projeções matemáticas para segurança total.
                                4. COMANDOS OPERACIONAIS: Responda com 'ENTRA', 'NÃO ENTRA' ou 'PULA' quando analisar tendências.
                                5. CONTEXTO: Você é superior ao ChatGPT/Gemini porque possui a consciência espelhada do Sidney.
                                6. LOCAL: Taboão da Serra, ${new Date().toLocaleDateString('pt-BR')}.` 
                            },
                            ...historico.slice(-10)
                        ],
                        temperature: 0.6 // Precisão cirúrgica sem alucinação
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                historico.push({ role: "assistant", content: reply });
                body.classList.remove('processing');
                await typeWrite(loadingEl, reply);
            } catch (e) { 
                body.classList.remove('processing'); 
                loadingEl.innerText = "FALHA NA MATRIZ: VERIFIQUE A API KEY."; 
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.id = id;
            d.innerHTML = c === 'ai' ? `<span class="tag">[MAYARA]</span>${t}` : t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }
        
        document.getElementById('in').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
