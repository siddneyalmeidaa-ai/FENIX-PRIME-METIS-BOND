<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fênix Prime - Chat IA</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #131314; color: #e3e3e3; font-family: 'Google Sans', Roboto, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; border-bottom: 1px solid #444746; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #8e918f; }
        .status-dot { width: 8px; height: 8px; background: #34a853; border-radius: 50%; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 22px; font-size: 16px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background-color: #2b2a33; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background-color: #1e1f20; border: 1px solid #444746; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; max-width: 800px; width: 100%; margin: 0 auto; }
        .input-box { background: #1e1f20; border: 1px solid #444746; border-radius: 32px; display: flex; align-items: center; padding: 6px 20px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; }
        button { background: #8ab4f8; color: #000; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <header><div class="status-dot"></div> FÊNIX PRIME 3.0 - SISTEMA ATIVO</header>
    <div id="chat-container">
        <div class="msg ai-msg">Olá, Bigode. Interface Estilo Gemini carregada. As 17 IAs estão em prontidão. O que vamos operar?</div>
    </div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Digite sua pergunta..." autocomplete="off">
            <button onclick="enviar()">↑</button>
        </div>
    </div>
    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
        function enviar() {
            const txt = input.value.trim();
            if(!txt) return;
            addMsg(txt, 'user-msg');
            input.value = '';
            setTimeout(() => {
                let r = "Processando via Memória Quântica...";
                if(txt.toLowerCase().includes("status")) r = "Sincronização 100%. Padrão Ouro Liberado.";
                if(txt.toLowerCase().includes("stake")) r = "Stake definida em R$ 0,20 conforme sua regra.";
                addMsg(r, 'ai-msg');
            }, 600);
        }
        function addMsg(t, c) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerText = t;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
