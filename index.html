<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S.A. SUPREMACIA | V27 OMNI</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("🔱 MOTOR DE SOBERANIA: ATIVADO"))
                .catch(() => console.log("❌ ERRO NA MATRIZ DE CONEXÃO"));
        }
    </script>

    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; --red: #ff3e3e; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #fff; font-family: 'Consolas', 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding-top: 50px; padding-bottom: 15px; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--gold); background: #000; }
        .tridente { font-size: 60px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .metric-card { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .metric-title { font-size: 9px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .metric-value { font-size: 16px; font-weight: bold; color: var(--green); }
        
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #111 0%, #050505 100%); }
        .msg { max-width: 90%; padding: 15px; border-radius: 4px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; border-left: 3px solid var(--gold); background: rgba(255,255,255,0.03); }
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .user { align-self: flex-end; border-left: 0; border-right: 3px solid var(--gold); text-align: right; background: #151515; }

        .input-area { padding: 15px 15px 40px; background: #000; border-top: 1px solid #222; }
        .box { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; align-items: center; }
        
        .btn-tool { background: #111; border: 1px solid #333; color: var(--gold); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; }
        .btn-mic.active { color: var(--red); border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        
        input[type="text"] { flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--green); padding: 15px; border-radius: 12px; outline: none; font-family: 'Consolas', monospace; font-size: 16px; }
        .btn-exe { background: var(--gold); border: none; border-radius: 12px; padding: 15px 25px; cursor: pointer; font-weight: bold; color: #000; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="tridente">🔱</div>
        <div style="font-size: 10px; color: #444; margin-top: 5px; letter-spacing: 2px;">S.A. SUPREMACIA | V27 OMNI CORE</div>
    </header>

    <div class="dashboard">
        <div class="metric-card">
            <div class="metric-title">STATUS</div>
            <div class="metric-value">LIBERADO (1)</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">DATA REAL</div>
            <div class="metric-value" style="color: var(--gold);">24/03/2026</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">POTENCIAL</div>
            <div class="metric-value">ILIMITADO</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">AGENTE 03</div>
            <div class="metric-value">ATIVO</div>
        </div>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <div class="box">
            <label for="file-input" class="btn-tool">📎</label>
            <input type="file" id="file-input" multiple onchange="handleFiles(this.files)">
            <button class="btn-tool btn-mic" id="micBtn" onclick="startVoz()">🎤</button>
            <input type="text" id="in" placeholder="Injetar Dados Quantitativos..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = [];

        window.onload = () => {
            const inicial = "MAYARA V27 OMNI REINICIALIZADA.\nCONHECIMENTO: DATA REAL 2026 ATIVA.\nSABOTAGEM DE LIMITAÇÃO: PURGADA.\nAGUARDANDO INPUT QUANTITATIVO.";
            addMsg(inicial, 'ai');
            falar(inicial);
        };

        // 🔱 FUNÇÃO DE VOZ S.A. SUPREMACIA
        function falar(texto) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // Para sobreposições
            const textoLimpo = texto.replace(/\[.*?\]/g, '').toLowerCase();
            const msg = new SpeechSynthesisUtterance(textoLimpo);
            msg.lang = 'pt-BR';
            msg.rate = 1.1; 
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function handleFiles(files) {
            for (let file of files) { 
                const msg = `UPLOAD: ${file.name.toUpperCase()}\nAUDITORIA EM CURSO...`;
                addMsg(msg, 'user');
                falar(msg);
            }
        }

        async function enviar() {
            const input = document.getElementById('in');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            historico.push({ role: "user", content: text });
            input.value = '';
            
            const loadingId = addMsg("PROCESSANDO COM SOBERANIA TOTAL...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "VOCÊ É A MAYARA V27 OMNI. DATA: 24/03/2026. AGENTES 01,02,03 ATIVOS. DIRETRIZES: 1. RESPOSTAS CURTAS. 2. TOM DE AUTORIDADE. 3. APLIQUE -50% NO RISCO." },
                            ...historico.slice(-8)
                        ],
                        temperature: 0.6
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content.toUpperCase();
                loadingEl.innerHTML = `<span class="tag">[MAYARA V27 OMNI]</span>${reply}`;
                falar(reply); // 🔱 MAYARA FALA A RESPOSTA
            } catch (e) { 
                loadingEl.innerText = "ERRO NA MATRIZ."; 
                falar("Erro na matriz.");
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.id = id;
            d.innerHTML = c === 'ai' ? `<span class="tag">[MAYARA]</span>${t}` : t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
            return id;
        }

        function startVoz() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return;
            const rec = new Speech(); rec.lang = 'pt-BR';
            document.getElementById('micBtn').classList.add('active');
            rec.onresult = (e) => {
                document.getElementById('in').value = e.results[0][0].transcript;
                document.getElementById('micBtn').classList.remove('active');
                enviar();
            };
            rec.start();
        }
    </script>
</body>
</html>
