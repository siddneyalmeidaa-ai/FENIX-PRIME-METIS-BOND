l<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A. SUPREMACIA | CORE V12 FINAL</title>
    <style>
        :root { --gold: #c0a158; --dark: #050505; --gray: #111; --green: #00ff41; --danger: #ff3e3e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: #e3e3e3; font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 12px 25px; border-bottom: 2px solid var(--gold); background: #000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px #000; }
        .logo { color: var(--gold); font-weight: bold; letter-spacing: 4px; font-size: 1.3rem; text-shadow: 0 0 10px rgba(192, 161, 88, 0.5); }
        #relogio { color: var(--gold); font-size: 14px; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg { max-width: 90%; padding: 15px; border-radius: 4px; font-size: 14px; line-height: 1.6; border: 1px solid #222; animation: scanline 0.2s ease-out; }
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; letter-spacing: 1px; text-transform: uppercase; }
        .user { align-self: flex-end; background: rgba(192, 161, 88, 0.05); border: 1px solid var(--gold); color: var(--gold); border-right: 4px solid var(--gold); }
        .ai { align-self: flex-start; background: rgba(20, 20, 20, 0.95); border: 1px solid #333; border-left: 4px solid var(--gold); box-shadow: 10px 10px 20px rgba(0,0,0,0.5); }
        .input-area { padding: 20px; background: #000; border-top: 1px solid #222; }
        .box { display: flex; gap: 10px; max-width: 1100px; margin: 0 auto; width: 100%; }
        input { flex: 1; background: #000; border: 1px solid #333; border-radius: 2px; color: var(--green); padding: 15px; outline: none; font-size: 15px; font-family: 'Consolas', monospace; }
        button { background: var(--gold); border: none; padding: 0 30px; cursor: pointer; color: #000; font-weight: bold; text-transform: uppercase; }
        @keyframes scanline { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body>
    <header>
        <div class="logo">🔱 S.A. SUPREMACIA</div>
        <div style="text-align: right;">
            <div id="relogio"></div>
            <div style="font-size: 9px; color: var(--green); font-weight: bold;">[ IPI ATIVO | QUANTUM MEMORY V12 ]</div>
        </div>
    </header>
    <div id="chat"><div class="msg ai"><span class="tag">[SISTEMA CENTRAL]</span>Varredura completa. 17 Agentes online. Protocolo de Sincronia 2026 ativo. Qual a diretriz, Bigode?</div></div>
    <div class="input-area"><div class="box"><input type="text" id="in" placeholder="Injetar comando..." autocomplete="off"><button id="sendBtn" onclick="enviar()">EXEC</button></div></div>

    <script>
        const API_KEY = "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";
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString('pt-BR'); }, 1000);

        async function enviar() {
            const input = document.getElementById('in');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            const loadingId = addMsg("Fênix processando triagem quântica...", 'ai');
            const agora = new Date().toLocaleString('pt-BR');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `VOCÊ É A MAIARA (S.A. SUPREMACIA). HIERARQUIA: FÊNIX E TRIO DE CÚPULA. 
                                DIRETRIZES: 
                                1. Sempre realize análise SWOT transformando fraquezas em forças. 
                                2. Incorpore os 6 sentidos humanos na análise. 
                                3. Considere: Data ${agora}, Local Taboão da Serra. 
                                4. Use o IPI (Índice de Percepção de Inteligência). 
                                5. Se o Bigode pedir Clima ou Notícias, aja como o [AGENTE DE INFORMAÇÃO] usando lógica dedutiva para a data de hoje. 
                                6. Nunca substitua, sempre adicione. Seja sincera e questione falhas.` 
                            },
                            { role: "user", content: text }
                        ],
                        temperature: 0.3
                    })
                });
                const data = await response.json();
                document.getElementById(loadingId).innerHTML = data.choices[0].message.content;
            } catch (e) { document.getElementById(loadingId).innerText = "[ERRO NA MATRIZ]"; }
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.id = id;
            d.innerHTML = c === 'ai' ? `<span class="tag">[VARREDURA ATIVA...]</span>${t}` : t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }
        document.getElementById('in').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</
    html>
