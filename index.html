<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FÊNIX PRIME V3.6.0 | S.A. SUPREMACIA</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; --red: #ff3e3e; --blue: #3498db; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #fff; font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding-top: 50px; padding-bottom: 15px; display: flex; flex-direction: column; align-items: center; background: #000; border-bottom: 1px solid var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
        .tridente { font-size: 60px; color: var(--gold); text-shadow: 0 0 25px var(--gold); cursor: pointer; transition: 0.5s; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #0a0a0a 0%, #050505 100%); }
        .msg { max-width: 85%; padding: 15px; border-radius: 10px; font-size: 13px; line-height: 1.5; border-left: 3px solid var(--gold); background: rgba(255,255,255,0.03); position: relative; }
        .user { align-self: flex-end; border-left: 0; border-right: 3px solid var(--gold); text-align: right; background: #111; }
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .input-area { padding: 20px 20px 40px; background: #000; border-top: 1px solid #222; }
        .box { display: flex; gap: 10px; max-width: 800px; margin: 0 auto; align-items: center; }
        .btn-tool { background: #111; border: 1px solid #333; color: var(--gold); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
        .btn-mic.active { color: var(--red); border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        input[type="text"] { flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--green); padding: 15px; border-radius: 12px; outline: none; font-size: 15px; }
        .btn-exe { background: var(--gold); border: none; border-radius: 12px; padding: 15px 20px; cursor: pointer; font-weight: bold; color: #000; }
        .status-bar { font-size: 9px; color: #444; margin-top: 5px; letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="tridente" id="logo">🔱</div>
    <div class="status-bar">S.A. SUPREMACIA | 2026 | TABOÃO DA SERRA</div>
</header>

<div id="chat"></div>

<div class="input-area">
    <div class="box">
        <button class="btn-tool" onclick="document.getElementById('file-input').click()">📎</button>
        <input type="file" id="file-input" style="display:none" multiple onchange="processarArquivo(this.files)">
        <button class="btn-tool btn-mic" id="micBtn" onclick="toggleVoz()">🎤</button>
        <input type="text" id="in" placeholder="Injetar Dados (DNA, 3D, BINÁRIO)..." autocomplete="off">
        <button class="btn-exe" onclick="enviar()">EXE</button>
    </div>
</div>

<script>
    // --- ESPINHA DORSAL & CONFIGURAÇÕES V3.6.0 ---
    const FenixConfig = {
        operador: "BIGODE",
        versao: "3.6.0",
        local: "TABOÃO DA SERRA, SP",
        stake: 0.20,
        ajuste: 0.50, // -50% PROJEÇÃO X
        apiKey: "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"
    };

    let isListening = false;
    let recognition;

    window.onload = () => {
        const bootMsg = `🔱 FÊNIX PRIME V3.6.0 ONLINE.
        \n📍 LOCAL: ${FenixConfig.local}
        \n🧬 BIO-SISTEMA & MÉTRICA 3D: SINCRONIZADOS.
        \n⚖️ DIAGNÓSTICO BINÁRIO: ATIVO (NÃO TRAVA).
        \n💰 STAKE FIXA: R$ ${FenixConfig.stake.toFixed(2)}.`;
        addMsg(bootMsg, 'ai');
    };

    // --- MOTOR DE DIAGNÓSTICO BINÁRIO (CÁLCULO DO INVISÍVEL) ---
    function calcularDiagnosticoBinario(texto) {
        // Simulação de cálculo das 17 IAs (Mestra dos Algoritmos)
        const bit = Math.random() > 0.4 ? 1 : 0; // 1 = Sucesso, 0 = Inconsistência
        const bruto = 100; // Valor base hipotético
        const x = bruto * FenixConfig.ajuste;
        const y = bruto;

        if (bit === 1) {
            return `✅ [DIAGNÓSTICO 1]: CÁLCULO BINÁRIO POSITIVO.
            \nOPÇÃO X (OURO): ${x} | OPÇÃO Y (BRUTO): ${y}
            \nSIDNEY, O CAMINHO ESTÁ LIMPO. O EXE É SEU.`;
        } else {
            return `⚠️ [DIAGNÓSTICO 0]: RISCO DETECTADO NO INVISÍVEL.
            \nOPÇÃO X (OURO): ${x} | OPÇÃO Y (BRUTO): ${y}
            \nSIDNEY, EU NÃO RECOMENDO, MAS VOCÊ É SOBERANO.`;
        }
    }

    async function enviar() {
        const input = document.getElementById('in');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';
        
        const diagId = addMsg("CALCULANDO BINÁRIO...", 'ai');
        const diagTexto = calcularDiagnosticoBinario(text);
        
        setTimeout(async () => {
            document.getElementById(diagId).innerHTML = formatarAI(diagTexto);
            falar(diagTexto);

            // Chamada API Groq para resposta contextualizada
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${FenixConfig.apiKey}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: `SOU MAYARA V3.6.0. OPERADOR: ${FenixConfig.operador}. DATA: 24/03/2026. LOCAL: ${FenixConfig.local}. REGRAS: 1. DIAGNÓSTICO BINÁRIO 0/1. 2. APLICAR -50% NO RISCO X. 3. ANALISAR DNA/3D/LIBRAS SE SOLICITADO.` }, {role: "user", content: text}],
                        temperature: 0.4
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content.toUpperCase();
                addMsg(reply, 'ai');
            } catch (e) { console.error("Erro na Matriz."); }
        }, 1000);
    }

    // --- ACESSIBILIDADE & MULTIMODALIDADE ---
    function processarArquivo(files) {
        for (let f of files) {
            const ext = f.name.split('.').pop().toUpperCase();
            addMsg(`🔱 CAPTURAÇÃO: ARQUIVO [${f.name.toUpperCase()}] CARREGADO.
            \nDECODIFICANDO VIA DOUTORA DOS BUGS...
            \nTRADUZINDO VIA PROFESSORA LÍNGUA-AFUDA...`, 'ai');
            
            if(ext === 'PDF' || ext === 'XLSX') {
                setTimeout(() => addMsg(`🧬 DIAGNÓSTICO GENÉTICO: DNA ANALISADO. STATUS: [VERIFICANDO PRODUTIVIDADE...]`, 'ai'), 2000);
            }
        }
    }

    function toggleVoz() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        if (!isListening) {
            recognition = new Speech();
            recognition.lang = 'pt-BR';
            recognition.start();
            recognition.onstart = () => { isListening = true; document.getElementById('micBtn').classList.add('active'); };
            recognition.onresult = (e) => { document.getElementById('in').value = e.results[0][0].transcript; stopVoz(); enviar(); };
            recognition.onend = () => stopVoz();
        } else { stopVoz(); }
    }

    function stopVoz() { if (recognition) recognition.stop(); isListening = false; document.getElementById('micBtn').classList.remove('active'); }

    function falar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t.replace(/🔱|✅|⚠️|\[.*?\]/g, ''));
        m.lang = 'pt-BR';
        window.speechSynthesis.speak(m);
    }

    function addMsg(t, c) {
        const id = "m-" + Date.now();
        const d = document.createElement('div');
        d.className = `msg ${c}`; d.id = id;
        d.innerHTML = c === 'ai' ? formatarAI(t) : t;
        document.getElementById('chat').appendChild(d);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        return id;
    }

    function formatarAI(t) {
        return `<span class="tag">[FÊNIX V3.6.0 OMNI]</span><span>${t}</span>`;
    }
</script>
</body>
</html>
