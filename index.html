<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A. SUPREMACIA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0b0b; color: #e3e3e3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 15px; border-bottom: 1px solid #c0a158; display: flex; align-items: center; justify-content: space-between; background: #111; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #c0a158; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #252525; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #161616; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .error-box { color: #ff4444; border: 1px solid #ff4444; padding: 10px; font-size: 0.8rem; background: rgba(255,0,0,0.1); }
        .input-box { padding: 20px; display: flex; gap: 10px; max-width: 800px; margin: 0 auto; width: 100%; }
        input { flex: 1; background: #1e1e1e; border: 1px solid #444; border-radius: 25px; color: #fff; padding: 12px 20px; outline: none; }
        button { background: #c0a158; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <header><div class="logo-area">🔱 S.A. SUPREMACIA</div></header>
    <div id="chat"><div class="msg ai">Sincronização iniciada. Aguardando comando, Bigode.</div></div>
    <div class="input-box">
        <input type="text" id="in" placeholder="Comando de voz ou texto..." autocomplete="off">
        <button onclick="enviar()">➤</button>
    </div>
    <script>
        const API_KEY = "AIzaSyBaysGMPXh4sHd0ytUe1I_XCHcG47aVYmw";

        async function enviar() {
            const input = document.getElementById('in');
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'user');
            input.value = '';
            const loadingId = addMsg("Tentando Túnel Alternativo...", 'ai');

            // TENTATIVA 1: ROTA V1 (ESTÁVEL)
            try {
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await res.json();

                if (data.candidates) {
                    document.getElementById(loadingId).innerText = data.candidates[0].content.parts[0].text;
                } else {
                    // SE FALHAR, EXIBE O ERRO DE BILLING/FATURAMENTO
                    document.getElementById(loadingId).innerHTML = `
                        <div class="error-box">
                            <strong>BLOQUEIO GOOGLE:</strong><br>
                            ${data.error.message}<br><br>
                            <em>Dica: Verifique se o faturamento está ativo no AI Studio.</em>
                        </div>`;
                }
            } catch (e) {
                document.getElementById(loadingId).innerText = "Erro físico de conexão.";
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.id = id;
            d.innerText = t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }
    </script>
</body>
