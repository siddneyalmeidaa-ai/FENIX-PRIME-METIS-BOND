<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fênix Prime - Chat IA</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #131314; color: #e3e3e3; font-family: 'Google Sans', Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; border-bottom: 1px solid #444746; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #8e918f; }
        .status-dot { width: 8px; height: 8px; background: #34a853; border-radius: 50%; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 16px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background-color: #2b2a33; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background-color: #1e1f20; border: 1px solid #444746; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; max-width: 800px; width: 100%; margin: 0 auto; }
        .input-box { background: #1e1f20; border: 1px solid #444746; border-radius: 32px; display: flex; align-items: center; padding: 6px 20px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; }
        button { background: #8ab4f8; color: #000; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <header><div class="status-dot"></div> FÊNIX PRIME
