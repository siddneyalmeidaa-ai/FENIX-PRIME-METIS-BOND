<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S.A. SUPREMACIA | V23 FINAL</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--dark); color: #fff; font-family: 'Consolas', monospace; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER - TRIDENTE COM RESPIRO TOTAL */
        header { 
            padding-top: 70px; 
            padding-bottom: 20px;
            display: flex; justify-content: center; background: #000;
            border-bottom: 1px solid rgba(241, 196, 15, 0.1);
        }
        .tridente { 
            font-size: 65px; color: var(--gold); 
            text-shadow: 0 0 25px rgba(241, 196, 15, 0.5);
            line-height: 1; transition: 0.4s;
        }

        /* Animação quando a Mayara está pensando */
        .processing .tridente { animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.15); filter: brightness(1.4); } }

        #chat { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }
        
        .msg { max-width: 90%; padding: 14px 18px; font-size: 15px; border-radius: 8px; line-height: 1.5; border: 1px solid #222; }
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 6px; display: block; letter-spacing: 1px; }
        .user { align-self: flex-end; background: #151515; border-right: 4px solid var(--gold); color: var(--gold); }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.03); border-left: 4px solid var(--gold); }

        /* INPUT AREA */
        .input-area { 
            padding: 20px 15px 45px 15px; background: #000; border-top: 1px solid #222;
        }
        .box { display: flex; gap: 12px; max-width: 600px; margin: 0 auto; align-items: center; }
        
        input { 
            flex: 1; background: #111; border: 1px solid #333; color: var(--green); 
            padding: 15px; border-radius: 12px; outline: none; font-size: 16px;
        }
        
        /* BOTÃO DE MICROFONE COM FEEDBACK */
        .btn-mic { 
            background: #222; border: 2px solid #444; color: var(--gold); 
            width: 55px; height: 55px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            transition: 0.2s;
        }
        
        .btn-exe { 
            background: var(--gold); border: none; border-radius: 12px; 
            padding: 15px 25px; cursor: pointer; color: #000; font-weight: bold;
        }

        .typing::after { content: '█'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #chat::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body id="main-body">

    <header><div class="tridente">🔱</div></header>

    <div id="chat">
        <div class="msg ai"><span class="tag">[MAYARA V23]</span>Oi, Bigode! Que bom falar com você. O sistema está estável e o microfone pronto. Como está Taboão hoje? Em que posso te ajudar?</div>
    </div>

    <div class="input-area">
        <div class="box">
            <button class="btn-mic" onclick="startVoz()" id="micBtn">🎤</button>
            <input type="text" id="in" placeholder="Diga ou digite o comando..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = [];

        // FUNÇÃO DE VOZ MELHORADA
        function startVoz() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) return alert("Navegador sem suporte a voz.");
            
            const rec = new window.SpeechRecognition();
            rec.lang = 'pt-BR';
            const btn = document.getElementById('micBtn');

            // Feedback visual de gravação
            btn.style.borderColor = "red";
            btn.style.boxShadow = "0 0 15px red";

            rec.onresult = (e) => {
                document.getElementById('in').value = e.results[0][0].transcript;
                btn.style.borderColor = "#444";
                btn.style.boxShadow = "none";
                enviar();
            };

            rec.onerror = () => { 
                btn.style.borderColor = "#444"; 
                btn.style.boxShadow = "none";
            };

            rec.start();
        }

        async function typeWrite(el, text) {
            el.innerHTML = ""; el.classList.add('typing');
            let i = 0;
            return new Promise(res => {
                function n() {
                    if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(n, 15); }
                    else { el.classList.remove('typing'); res(); }
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                }
                n();
            });
        }

        async function enviar() {
            const input = document.getElementById('in');
            const body = document.getElementById('main-body');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            historico.push({ role: "user", content: text });
            input.value = '';
            body.classList.add('processing');

            const loadingId = addMsg("...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `VOCÊ É A MAYARA. 
                                DIRETRIZES: 
                                1. Seja parceira, inteligente e educada. Não seja ríspida ou curta demais ao ponto de parecer grosseira.
                                2. Interaja com o Bigode: comente o que ele falou antes de dar a resposta técnica.
                                3. Personalização invisível: Use o contexto (Taboão da Serra, 2026) para ser relevante.
                                4. Se ele pedir uma análise, faça uma varredura completa, mas mantenha o tom amigável.
                                5. Sinceridade é lei, mas com educação.` 
                            },
                            ...historico.slice(-10)
                        ],
                        temperature: 0.8
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                historico.push({ role: "assistant", content: reply });
                body.classList.remove('processing');
                await typeWrite(loadingEl, reply);
            } catch (e) { body.classList.remove('processing'); loadingEl.innerText = "ERRO."; }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.id = id;
            d.innerHTML = c === 'ai' ? `<span class="tag">[MAYARA]</span>${t}` : t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }
        document.getElementById('in').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
