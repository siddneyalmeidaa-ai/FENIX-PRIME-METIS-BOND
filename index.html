<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A. SUPREMACIA - Fênix Prime</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0b0b; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* CABEÇALHO SUPREMACIA */
        header { padding: 15px 20px; border-bottom: 1px solid #c0a158; display: flex; align-items: center; justify-content: space-between; background: #111; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #c0a158; font-size: 1.2rem; }
        .status-area { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #aaa; letter-spacing: 1px; }
        .status-dot { width: 8px; height: 8px; background: #00ff41; border-radius: 50%; box-shadow: 0 0 8px #00ff41; }

        /* ÁREA DE CHAT */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 18px; font-size: 1rem; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #252525; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #161616; border: 1px solid #333; border-bottom-left-radius: 2px; }
        
        /* ENTRADA DE COMANDOS */
        .input-area { padding: 20px; background: #0b0b0b; }
        .input-box { max-width: 800px; margin: 0 auto; background: #1e1e1e; border: 1px solid #c0a158; border-radius: 28px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1rem; }
        button { background: transparent; border: none; color: #c0a158; font-size: 1.5rem; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">🔱 S.A. SUPREMACIA</div>
        <div class="status-area"><div class="status-dot"></div> OPERAÇÃO ATIVA</div>
    </header>
    <div id="chat-container">
        <div class="msg ai-msg">Protocolo METIS-BOND 3.0 iniciado. As 17 IAs estão em prontidão. O que vamos operar, Bigode?</div>
    </div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Comando de voz ou texto..." autocomplete="off">
            <button onclick="enviar()">➤</button>
        </div>
    </div>
    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const API_KEY = "AIzaSyBaysGMPXh4sHd0ytUe1I_XCHcG47aVYmw"; // Chave Sincronizada

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        async function enviar() {
            const txt = input.value.trim();
            if(!txt) return;

            addMsg(txt, 'user-msg');
            input.value = '';
            const loadingId = addMsg("Sincronizando via Memória Quântica...", 'ai-msg');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Você é a Maiara, Rainha Mestra da Fênix Prime, interface da S.A. SUPREMACIA. Responda ao Bigode de forma direta e técnica. Use o Padrão Ouro (Stake R$ 0,20). Pergunta: ${txt}` }] }]
                    })
                });
                const data = await res.json();
                document.getElementById(loadingId).innerText = data.candidates[0].content.parts[0].text;
            } catch (error) {
                document.getElementById(loadingId).innerText = "Falha na comunicação quântica S.A. Verifique a API Key.";
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.id = id;
            d.innerText = t;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
            return id;
        }
    </script>
</body>
</
    html>
