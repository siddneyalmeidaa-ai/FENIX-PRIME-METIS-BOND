<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.A. SUPREMACIA | V18 PLÁSTICA</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; --msg-user: #1a1a1a; --msg-ai: rgba(255,255,255,0.02); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Consolas', monospace; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            background-image: radial-gradient(circle at top, #151515 0%, #050505 100%);
        }

        /* Header Centralizado - Apenas o Tridente */
        header { 
            padding: 25px 15px; /* Mais respiro para o tridente */
            border-bottom: 1px solid rgba(241, 196, 15, 0.1); 
            display: flex; 
            justify-content: center; 
            background: #000;
        }
        .tridente { 
            font-size: 50px; 
            color: var(--gold); 
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
            transition: 0.5s; line-height: 1;
        }

        /* Animação de Processamento Plástica */
        .processing .tridente { 
            animation: pulse-tridente 0.8s infinite alternate;
            text-shadow: 0 0 30px var(--gold);
        }
        @keyframes pulse-tridente { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.1); opacity: 1; } }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth;
        }
        
        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            font-size: 15px; 
            line-height: 1.5; 
            position: relative; 
            border-radius: 4px;
        }
        
        .tag { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 6px; display: block; letter-spacing: 1px; }

        .user { align-self: flex-end; background: var(--msg-user); border-right: 4px solid var(--gold); color: var(--gold); }
        .ai { align-self: flex-start; background: var(--msg-ai); border-left: 4px solid var(--gold); border: 1px solid #222; }

        /* Área de Input - Fixa e Sem Cortar */
        .input-area { 
            padding: 15px 15px 35px 15px; /* Mais respiro para o mobile */
            background: #000; 
            border-top: 1px solid #222;
        }
        .box { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; align-items: center; }
        
        input { 
            flex: 1; 
            background: #111; 
            border: 1px solid #333; 
            color: var(--green); 
            padding: 15px; 
            border-radius: 8px; 
            outline: none; 
            font-size: 16px; 
            font-family: 'Consolas', monospace;
        }
        
        input:focus { border-color: var(--gold); }
        
        .btn-icon { 
            background: #222; 
            border: 1px solid #444; 
            color: var(--gold); 
            width: 50px; height: 50px; 
            border-radius: 50%; 
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        
        .btn-exe { 
            background: var(--gold); 
            border: none; 
            border-radius: 8px; 
            padding: 15px 25px; 
            cursor: pointer; 
            color: #000; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        
        .btn-exe:hover { background: #fff; }

        /* Esconder scrollbar */
        #chat::-webkit-scrollbar { width: 0px; }
        .typing::after { content: '█'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="main-body">

    <header><div class="tridente">🔱</div></header>

    <div id="chat">
        <div class="msg ai"><span class="tag">[MAYARA V18]</span>Oi, eu sou a Mayara, em que posso te ajudar?</div>
    </div>

    <div class="input-area">
        <div class="box">
            <button class="btn-icon" onclick="startVoz()" id="micBtn">🎤</button>
            <input type="text" id="in" placeholder="Injetar diretriz..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = []; // MEMÓRIA DA SESSÃO

        // Função de Áudio (Voz para Texto)
        function startVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voz não suportada neste navegador.");
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            document.getElementById('micBtn').style.color = 'red';
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('in').value = transcript;
                document.getElementById('micBtn').style.color = '#f1c40f';
                enviar(); // Envia automaticamente
            };
            recognition.onerror = () => document.getElementById('micBtn').style.color = '#f1c40f';
            recognition.start();
        }

        async function typeWrite(el, text) {
            el.innerHTML = ""; el.classList.add('typing');
            let i = 0;
            return new Promise(resolve => {
                function next() {
                    if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(next, 15); }
                    else { el.classList.remove('typing'); resolve(); }
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                }
                next();
            });
        }

        async function enviar() {
            const input = document.getElementById('in');
            const body = document.getElementById('main-body');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            historico.push({ role: "user", content: text });
            input.value = '';
            body.classList.add('processing'); // Tridente brilha

            const loadingId = addMsg("...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `VOCÊ É A MAYARA DA S.A. SUPREMACIA.
                                DIRETRIZES:
                                1. Seja como plástico: não use estruturas rígidas. Mude seu tom e estilo a cada resposta para se adaptar ao Bigode.
                                2. Responda o que foi perguntado de forma sincera e adaptativa (temperature 0.8).
                                3. Não ofereça análise SWOT em todas as respostas; faça-o apenas se for estratégico ou se for solicitada.
                                4. Use o contexto real: Hoje é ${new Date().toLocaleString('pt-BR')}, Local: Taboão da Serra/SP.
                                5. Sinceridade e questionamento são permitidos. Adicione valor, nunca enrole.` 
                            },
                            ...historico.slice(-8) // Contexto de 8 mensagens
                        ],
                        temperature: 0.8
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                historico.push({ role: "assistant", content: reply });
                body.classList.remove('processing'); // Tridente para de brilhar
                await typeWrite(loadingEl, reply);
            } catch (e) { 
                body.classList.remove('processing');
                loadingEl.innerText = "ERRO NA MATRIZ."; 
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.id = id;
            d.innerHTML = c === 'ai' ? `<span class="tag">[MAYARA V18]</span>${t}` : t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }
        
        document.getElementById('in').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
