<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fênix Prime - S.A. SUPREMACIA</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e1f20">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #131314; color: #e3e3e3; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        header { padding: 45px 20px 15px; font-weight: bold; border-bottom: 1px solid #444746; display: flex; align-items: center; justify-content: space-between; background: #1e1f20; }
        .status-dot { width: 12px; height: 12px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 12px #00ff00; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 15px; }
        .ai-msg { align-self: flex-start; background-color: #1e1f20; border: 1px solid #444746; border-bottom-left-radius: 4px; }
        .user-msg { align-self: flex-end; background-color: #2b2a33; border-bottom-right-radius: 4px; color: #fff; }
        .tag-ai { color: #8ab4f8; font-size: 10px; font-weight: bold; display: block; margin-bottom: 5px; }
        .monitor-soberania { background: #1e1f20; padding: 12px; border: 1px solid #33CC33; border-radius: 8px; margin: 10px 20px; font-family: monospace; border-left: 4px solid #33CC33; }
        .monitor-grid { color: #e3e3e3; font-size: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .input-wrapper { padding: 15px 20px; background: #131314; border-top: 1px solid #1e1f20; padding-bottom: calc(25px + env(safe-area-inset-bottom)); }
        .input-box { max-width: 800px; margin: 0 auto; background: #1e1f20; border: 1px solid #444746; border-radius: 28px; display: flex; align-items: center; padding: 5px 15px; gap: 10px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; }
        .btn-exe { background: #8ab4f8; color: #000; border: none; border-radius: 20px; padding: 8px 20px; cursor: pointer; font-weight: bold; }
        .footer-text { text-align: center; font-size: 10px; color: #8e918f; margin-top: 8px; text-transform: uppercase; }
    </style>
</head>
<body>
<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div class="status-dot"></div>
        <span>FÊNIX PRIME: <span style="color: #00ff00;">LIBERADO (1)</span></span>
    </div>
    <div style="font-size: 12px; color: #8ab4f8;">V3.6.2 | 2026</div>
</header>
<div id="chat-container"></div>
<div class="monitor-soberania">
    <div class="monitor-grid">
        <div>ESTABILIDADE PWA: <span style="color: #33CC33;">● ATIVO</span></div>
        <div>QUANTUM MEMORY: <span style="color: #33CC33;">● SINCRO</span></div>
        <div>PROTOCOLO IPI: <span style="color: #33CC33;">● R$ 0,20</span></div>
        <div>AJUSTE RISCO: <span style="color: #33CC33;">● -50%</span></div>
    </div>
</div>
<div class="input-wrapper">
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Comando para Sidney..." autocomplete="off">
        <button class="btn-exe" onclick="enviar()">EXE</button>
    </div>
    <div class="footer-text">PROTOCOLO IPI | STAKE R$ 0,20 | TABOÃO DA SERRA | ARQUITETO S.P.A.</div>
</div>

<script>
    const container = document.getElementById('chat-container');
    const input = document.getElementById('user-input');
    const API_URL = window.location.origin + "/chat";

    function salvarMemoria(txt, classe) {
        let mem = JSON.parse(localStorage.getItem('FENIX_S_V3')) || [];
        mem.push({txt, classe});
        if(mem.length > 30) mem.shift();
        localStorage.setItem('FENIX_S_V3', JSON.stringify(mem));
    }

    async function enviar() {
        const txt = input.value.trim();
        if(!txt) return;
        const historico = JSON.parse(localStorage.getItem('FENIX_S_V3')) || [];
        
        addMsg(txt, 'user-msg');
        salvarMemoria(txt, 'user-msg');
        input.value = '';

        const idAi = "ai_" + Date.now();
        addMsg("S.P.A. PROCESSANDO...", 'ai-msg', idAi);

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: txt, context: historico, arquiteto: "SIDNEY PEREIRA DE ALMEIDA" })
            });
            const data = await res.json();
            document.getElementById(idAi).innerHTML = `<span class="tag-ai">🔱 FÊNIX V3.6.2</span>${data.response.toUpperCase()}`;
            salvarMemoria(data.response, 'ai-msg');
        } catch(e) {
            document.getElementById(idAi).innerText = "ERRO DE MOTOR QUÂNTICO.";
        }
    }

    function addMsg(txt, classe, id = null, hist = false) {
        const div = document.createElement('div');
        div.className = `message ${classe}`;
        if(id) div.id = id;
        div.innerHTML = (classe === 'ai-msg' ? '<span class="tag-ai">🔱 FÊNIX V3.6.2</span>' : '') + txt.toUpperCase();
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    window.onload = () => {
        const mem = JSON.parse(localStorage.getItem('FENIX_S_V3')) || [];
        mem.forEach(m => addMsg(m.txt, m.classe, null, true));
        addMsg("SOBERANIA ATIVA. ARQUITETO SIDNEY NO COMANDO.", 'ai-msg');
    };
</script>
</body>
</html>
