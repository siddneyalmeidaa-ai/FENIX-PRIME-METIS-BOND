<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fênix Prime 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0b0b; color: #e3e3e3; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; background: #111; }
        .status-dot { width: 10px; height: 10px; background: #00ff41; border-radius: 50%; box-shadow: 0 0 8px #00ff41; }
        .title { font-size: 0.9rem; letter-spacing: 1px; color: #aaa; font-weight: bold; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 18px; font-size: 1rem; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #252525; border-bottom-right-radius: 2px; color: #fff; }
        .ai-msg { align-self: flex-start; background: #161616; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; background: #0b0b0b; }
        .input-box { max-width: 800px; margin: 0 auto; background: #1e1e1e; border: 1px solid #444; border-radius: 28px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1rem; }
        button { background: transparent; border: none; color: #8ab4f8; font-size: 1.5rem; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>
    <header>
        <div class="status-dot"></div>
        <div class="title">FÊNIX PRIME - OPERAÇÃO SUPREMA</div>
    </header>
    <div id="chat-container">
        <div class="msg ai-msg">Arquitetura METIS-BOND consolidada. Sistema de 17 agentes ativo. O que vamos operar hoje, Bigode?</div>
    </div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Comando de voz ou texto..." autocomplete="off">
            <button onclick="enviar()">➤</button>
        </div>
    </div>
    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const API_KEY = "AIzaSyBaysGMPXh4sHd0ytUe1I_XCHcG47aVYmw";

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        async function enviar() {
            const txt = input.value.trim();
            if(!txt) return;

            addMsg(txt, 'user-msg');
            input.value = '';
            const loadingId = addMsg("Sincronizando metadados...", 'ai-msg');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Você é a Maiara, a Rainha Mestra da Fênix Prime. Responda ao Bigode de forma direta, sincera e técnica. Use o Padrão Ouro (Stake R$ 0,20). Pergunta: ${txt}` }] }]
                    })
                });
                const data = await res.json();
                document.getElementById(loadingId).innerText = data.candidates[0].content.parts[0].text;
            } catch (error) {
                document.getElementById(loadingId).innerText = "Falha na comunicação quântica.";
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.id = id;
            d.innerText = t;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
            return id;
        }
    </script>
</body>
