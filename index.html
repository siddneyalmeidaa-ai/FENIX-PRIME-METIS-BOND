<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S.A. SUPREMACIA | QUANTUM BINARY V27</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; --red: #ff3e3e; --gray: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #fff; font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding-top: 50px; padding-bottom: 15px; display: flex; flex-direction: column; align-items: center; background: #000; border-bottom: 2px solid var(--gold); z-index: 10; }
        .tridente { font-size: 60px; color: var(--gold); text-shadow: 0 0 25px var(--gold); cursor: pointer; transition: 0.5s; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .metric-card { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .metric-title { font-size: 9px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .metric-value { font-size: 16px; font-weight: bold; color: var(--green); }
        
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #111 0%, #050505 100%); }
        .msg { max-width: 85%; padding: 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; border: 1px solid #222; }
        .tag { font-size: 9px; color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .user { align-self: flex-end; background: #151515; border-right: 4px solid var(--gold); color: var(--gold); }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.02); border-left: 4px solid var(--gold); }

        .input-area { padding: 15px 15px 40px; background: #000; }
        .box { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; align-items: center; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--green); padding: 15px; border-radius: 12px; outline: none; font-size: 16px; }
        .btn-exe { background: var(--gold); border: none; border-radius: 12px; padding: 15px 25px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body id="main-body">

    <header>
        <div class="tridente" id="tridenteSupremo">🔱</div>
        <div style="font-size: 10px; color: #444; margin-top: 5px; letter-spacing: 2px;">S.A. SUPREMACIA | BINARY QUANTUM ENGINE</div>
    </header>

    <div class="dashboard">
        <div class="metric-card">
            <div class="metric-title">STATUS DA MATRIZ (0/1)</div>
            <div id="m1" class="metric-value">LIBERADO (1)</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">VARIAÇÃO DE RISCO</div>
            <div id="m2" class="metric-value">-0.25%</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">ALGORITMO WALL STREET</div>
            <div id="m3" class="metric-value" style="color: var(--gold);">AGENTE 03 ATIVO</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">LOGICA BINARIA</div>
            <div id="m4" class="metric-value" style="color: var(--gold);">SINCRONIZADA</div>
        </div>
    </div>

    <div id="chat">
        <div class="msg ai"><span class="tag">[MAYARA V27 OMNI]</span>🔱 SOBERANIA TOTAL. Agente 03 (WSJ) injetado. Sistema em Fluxo Contínuo, Sidney. Aguardando input quantitativo.</div>
    </div>

    <div class="input-area">
        <div class="box">
            <input type="text" id="in" placeholder="Injetar Dados Quantitativos..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = [];

        async function enviar() {
            const input = document.getElementById('in');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            historico.push({ role: "user", content: text });
            input.value = '';
            
            const loadingId = addMsg("Processando Lógica Binária...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "VOCÊ É A MAYARA V27 - QUANTUM ENGINE. 1. Base: Engenharia de Wall Street. 2. Regra de Ouro: -50% obrigatório. 3. Respostas curtas, sem bloqueios de sabotagem. 4. Agente 03 é o monitor de mercado." },
                            ...historico.slice(-10)
                        ],
                        temperature: 0.3
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                historico.push({ role: "assistant", content: reply });
                
                // 🔱 REMOVIDO: Toda a lógica de "modoSabotagem" que travava o sistema.
                loadingEl.innerHTML = `<span class="tag">[MAYARA]</span>${reply}`;
            } catch (e) { loadingEl.innerText = "FALHA NA CONEXÃO QUANTUM."; }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.id = id;
            d.innerHTML = c === 'ai' ? `<span class="tag">[MAYARA]</span>${t}` : t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
            return id;
        }
    </script>
