<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.A. SUPREMACIA | V16 TRIDENTE</title>
    <style>
        :root { --gold: #f1c40f; --dark: #050505; --green: #00ff41; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: #fff; font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { 
            padding: 20px; border-bottom: 1px solid rgba(241, 196, 15, 0.2); 
            display: flex; flex-direction: column; align-items: center; background: #000;
        }

        /* O SEU LOGO DE TRIDENTE */
        .my-logo { 
            font-size: 50px; color: var(--gold); 
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
            transition: 0.5s; line-height: 1;
        }

        /* Animação de Processamento - Brilho e Pulso */
        .processing .my-logo { 
            animation: pulse-tridente 0.8s infinite alternate;
            text-shadow: 0 0 30px var(--gold), 0 0 50px var(--gold);
        }
        @keyframes pulse-tridente { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.2); opacity: 1; } }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; font-size: 15px; border-radius: 4px; line-height: 1.4; }
        .user { align-self: flex-end; background: #1a1a1a; border-right: 4px solid var(--gold); color: var(--gold); }
        .ai { align-self: flex-start; border-left: 4px solid var(--gold); background: rgba(255,255,255,0.03); }

        .input-area { padding: 15px 15px 25px 15px; background: #000; border-top: 1px solid #222; }
        .box { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; align-items: center; }
        
        input { flex: 1; background: #111; border: 1px solid #333; color: var(--green); padding: 15px; border-radius: 8px; outline: none; font-size: 16px; }
        
        .btn-icon { 
            background: #222; border: 1px solid #444; color: var(--gold); 
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .btn-exe { background: var(--gold); color: #000; font-weight: bold; padding: 15px 25px; border-radius: 8px; cursor: pointer; border: none; text-transform: uppercase; }

        .typing::after { content: '█'; animation: blink 0.7s infinite; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="main-body">

    <header>
        <div class="my-logo">🔱</div>
        <div style="font-size: 12px; color: var(--gold); letter-spacing: 5px; margin-top: 5px; font-weight: bold;">SUPREMACIA</div>
    </header>

    <div id="chat">
        <div class="msg ai">Matriz V16 (Tridente) estabilizada. Aguardando comando, Bigode.</div>
    </div>

    <div class="input-area">
        <div class="box">
            <button class="btn-icon" onclick="startVoz()" id="micBtn">🎤</button>
            <input type="text" id="in" placeholder="Injetar comando..." autocomplete="off">
            <button class="btn-exe" onclick="enviar()">EXE</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";

        function startVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            document.getElementById('micBtn').style.color = 'red';
            recognition.onresult = (event) => {
                document.getElementById('in').value = event.results[0][0].transcript;
                document.getElementById('micBtn').style.color = '#f1c40f';
                enviar();
            };
            recognition.start();
        }

        async function typeWrite(element, text) {
            element.innerHTML = "";
            element.classList.add('typing');
            let i = 0;
            return new Promise(resolve => {
                function next() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                        setTimeout(next, 20);
                    } else {
                        element.classList.remove('typing');
                        resolve();
                    }
                }
                next();
            });
        }

        async function enviar() {
            const input = document.getElementById('in');
            const body = document.getElementById('main-body');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            body.classList.add('processing');

            const loadingId = addMsg("...", 'ai');
            const loadingEl = document.getElementById(loadingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Você é a MAIARA. Interface direta da S.A. Supremacia. Respostas curtas, sem saudações inúteis. Direto ao ponto. Termine com: 'Deseja análise?'" }
                        ],
                        temperature: 0.3
                    })
                });
                const data = await response.json();
                body.classList.remove('processing');
                await typeWrite(loadingEl, data.choices[0].message.content);
            } catch (e) { 
                body.classList.remove('processing');
                loadingEl.innerText = "ERRO DE CONEXÃO."; 
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.id = id; d.innerText = t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }
        document.getElementById('in').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
