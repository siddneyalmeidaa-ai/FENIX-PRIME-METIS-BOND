<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A. SUPREMACIA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0b0b; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid #c0a158; display: flex; align-items: center; justify-content: space-between; background: #111; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #c0a158; font-size: 1.1rem; }
        .status-area { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #aaa; }
        .status-dot { width: 8px; height: 8px; background: #00ff41; border-radius: 50%; box-shadow: 0 0 8px #00ff41; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 18px; font-size: 1rem; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #252525; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #161616; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .error-msg { color: #ff4444; font-size: 0.8rem; margin-top: 5px; border: 1px dashed #ff4444; padding: 10px; }
        .input-area { padding: 20px; background: #0b0b0b; }
        .input-box { max-width: 800px; margin: 0 auto; background: #1e1e1e; border: 1px solid #c0a158; border-radius: 28px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1rem; }
        button { background: transparent; border: none; color: #c0a158; font-size: 1.5rem; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">🔱 S.A. SUPREMACIA</div>
        <div class="status-area"><div class="status-dot"></div> OPERAÇÃO ATIVA</div>
    </header>
    <div id="chat-container">
        <div class="msg ai-msg">Sistemas sincronizados. Aguardando diretrizes para homologação de túnel. O que faremos, Bigode?</div>
    </div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Digite seu comando..." autocomplete="off">
            <button onclick="enviar()">➤</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        
        // CHAVE DE API HOMOLOGADA
        const API_KEY = "AIzaSyBaysGMPXh4sHd0ytUe1I_XCHcG47aVYmw"; 

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        async function enviar() {
            const txt = input.value.trim();
            if(!txt) return;

            addMsg(txt, 'user-msg');
            input.value = '';
            const loadingId = addMsg("Rastreando túnel de dados...", 'ai-msg');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Você é a Maiara, interface da S.A. SUPREMACIA. Responda ao Bigode. Pergunta: ${txt}` }] }]
                    })
                });

                const data = await res.json();

                if (data.error) {
                    // DIAGNÓSTICO DE ERRO NO TÚNEL
                    document.getElementById(loadingId).innerHTML = `
                        <div class="error-msg">
                            <strong>FALHA NA HOMOLOGAÇÃO:</strong><br>
                            Código: ${data.error.code}<br>
                            Status: ${data.error.status}<br>
                            Mensagem: ${data.error.message}
                        </div>`;
                } else {
                    document.getElementById(loadingId).innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (error) {
                document.getElementById(loadingId).innerText = "ERRO CRÍTICO: O túnel foi bloqueado pelo navegador ou rede.";
            }
        }

        function addMsg(t, c) {
            const id = "m-" + Date.now();
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.id = id;
            d.innerText = t;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
